services:
  - type: web
    name: pinnacle-mailer-backend
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npx prisma generate --schema apps/backend/prisma/schema.prisma && npx nx build backend && npx prisma migrate deploy --schema apps/backend/prisma/schema.prisma
    startCommand: node dist/apps/backend/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: file:/var/data/pinnacle-mailer.db
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: AUTH_URL
        sync: false
      - key: LOG_LEVEL
        value: info
    disk:
      name: prisma-data
      mountPath: /var/data
      sizeGB: 1
